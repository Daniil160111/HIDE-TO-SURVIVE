<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HIDE TO SURVIVE - Психбольница</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Three.js -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        body {
            background: #0a0000;
            color: white;
            overflow: hidden;
            touch-action: none;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        /* Кастомные диалоги */
        .custom-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #8b0000;
            border-radius: 25px;
            padding: 30px;
            min-width: 300px;
            max-width: 400px;
            color: white;
            text-align: center;
            z-index: 10000;
            display: none;
            box-shadow: 0 0 60px #ff0000, inset 0 0 20px #330000;
            animation: dialogGlow 0.3s ease;
        }
        @keyframes dialogGlow {
            from { opacity: 0; transform: translate(-50%, -40%); box-shadow: 0 0 0px #ff0000; }
            to { opacity: 1; transform: translate(-50%, -50%); box-shadow: 0 0 60px #ff0000; }
        }
        .custom-dialog.active { display: block; }
        .custom-dialog input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            background: #2a0000;
            border: 1px solid #8b0000;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .custom-dialog-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .custom-dialog button {
            padding: 10px 25px;
            background: #8b0000;
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .custom-dialog button:active { transform: scale(0.95); }
        /* Экраны */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background-size: cover;
            background-position: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .screen.active { display: flex; }
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 2;
        }
        .screen-overlay.dark { background: rgba(0,0,0,0.7); }
        .transition-lock { pointer-events: none; }
        /* Анимация падающих кнопок */
        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        /* Авторизация */
        .auth-card {
            width: 90%;
            max-width: 380px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 30px 25px;
            margin: auto;
            border: 2px solid #8b0000;
            box-shadow: 0 0 40px rgba(139,0,0,0.5);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-card h1 {
            text-align: center;
            color: #ff4d4d;
            margin-bottom: 25px;
            font-size: 36px;
            text-shadow: 0 0 20px #ff0000;
        }
        .auth-step { display: none; }
        .auth-step.active { display: block; }
        .auth-input, .btn {
            width: 100%;
            padding: 14px 20px;
            margin: 10px 0;
            border-radius: 50px;
            border: none;
            background: #1e0000;
            color: white;
            font-size: 16px;
            outline: none;
            border: 1px solid #8b0000;
            transition: 0.2s;
        }
        .auth-input:focus { border-color: #ff4d4d; box-shadow: 0 0 15px #ff0000; }
        .btn {
            background: linear-gradient(145deg, #8b0000, #4a0000);

            font-weight: bold;
            letter-spacing: 2px;
        }
        .btn:active { transform: scale(0.97); }

            color: #ffaaaa;
            text-align: center;
            margin-top: 15px;

        }
        /* Главное меню */

            background: #4a0000;
            border: 1px solid #ff4d4d;
        }
        .menu-header .coins { background: #ffb347; color: #1e1e2f; }
        .menu-buttons {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .menu-btn {
            width: 280px;
            padding: 18px;
            border-radius: 60px;
            background: rgba(70,0,0,0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #ff4d4d;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;

        }

        .menu-btn:nth-child(2) { animation-delay: 0.2s; }
        .menu-btn:nth-child(3) { animation-delay: 0.3s; }
        .menu-btn:active { transform: scale(0.96); background: rgba(100,0,0,0.9); box-shadow: 0 0 30px #ff4d4d; }
        .menu-btn.small { width: 240px; font-size: 22px; padding: 14px; }
        /* Список комнат */
        .rooms-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        .room-item, .create-room {
            background: rgba(40,0,0,0.85);

            left: 40px;
            z-index: 20;

        .timer-display {

            top: 20px;
            left: 20px;

            backdrop-filter: blur(10px);

        .game-message {

            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);

            z-index: 20;

        .back-btn {
            position: absolute;

            border-radius: 30px;
            cursor: pointer;

        /* Результаты */
        .results-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);

            gap: 25px;

            font-size: 48px;
            color: #ffaa44;
            text-shadow: 0 0 20px #ff6600;
        }
        .stats-card {
            background: rgba(30,0,0,0.8);

        .results-screen button {
            background: #8b0000;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 20px;
            color: white;
            cursor: pointer;
            margin-top: 20px;

        @keyframes fadeIn {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(20px); }
        }
        .hidden { display: none !important; }
        /* Настройки */
        .settings-item {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 25px;
            margin: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .settings-item button {
            background: #5a0000;
            border: none;
            padding: 8px 25px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        /* Режим выбора */
        .mode-select {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }
        .mode-btn {
            background: linear-gradient(145deg, #4a0000, #2a0000);

            border-radius: 60px;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn:active { transform: scale(0.97); background: #6a0000; }
    </style>

    <script>

        const firebaseConfig = {

            authDomain: "messenger-e7f24.firebaseapp.com",

        const GAME_USERS = 'game_users_v3';

        // Game state

        let gameLoop = null;

        // Audio elements

        // Map

        // ========== Аудио ==========
        function fadeAudio(element, target, duration = 500) {
            if (!element) return;
            const start = element.volume;
            const startTime = performance.now();
            function step(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                element.volume = start + (target - start) * progress;
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function switchMusic(newMusic, fadeOut = 500, fadeIn = 500) {
            if (currentMusic && currentMusic !== newMusic) {
                fadeAudio(currentMusic, 0, fadeOut);
                setTimeout(() => {
                    if (currentMusic) currentMusic.pause();
                    currentMusic = newMusic;
                    if (currentMusic) {
                        currentMusic.currentTime = 0;
                        currentMusic.play().catch(()=>{});
                        fadeAudio(currentMusic, 0.8, fadeIn);
                    }
                }, fadeOut);
            } else if (!currentMusic && newMusic) {
                currentMusic = newMusic;
                currentMusic.play().catch(()=>{});
                fadeAudio(currentMusic, 0.8, fadeIn);
            }
        }

        function playButtonSoundEffect() { buttonSound.currentTime = 0; buttonSound.play().catch(()=>{}); }

        // ========== Диалоги ==========
        function showDialog(title, content, buttons) {
            return new Promise((resolve) => {
                const d = document.getElementById('custom-dialog');
                document.getElementById('dialog-title').innerHTML = title;
                document.getElementById('dialog-content').innerHTML = content;
                const btnsDiv = document.getElementById('dialog-buttons');
                btnsDiv.innerHTML = '';
                buttons.forEach(btn => {
                    const b = document.createElement('button');
                    b.textContent = btn.text;

        async function handleAuth() {
            playButtonSoundEffect();
            const pass = document.getElementById('auth-pass').value;
            const passConfirm = document.getElementById('auth-pass-confirm').value;
            const isLogin = document.getElementById('auth-pass-confirm').style.display === 'none';
            if (!pass) return alert('Введите пароль');
            if (!isLogin) {
                if (pass !== passConfirm) return alert('Пароли не совпадают');
                if (pass.length > 20 || !/^[a-zA-Z0-9._-]+$/.test(pass)) return alert('Недопустимый пароль');
                let playerId;
                do { playerId = Math.floor(100000000 + Math.random()*900000000).toString(); } while ((await db.collection(GAME_USERS).where('playerId','==',playerId).get()).size > 0);
                currentUser = { nickname: tempNickname, password: pass, playerId, coins: 100, skin: 'default', createdAt: Date.now() };
                await db.collection(GAME_USERS).doc(tempNickname).set(currentUser);
                completeLogin();
            } else {
                const userDoc = await db.collection(GAME_USERS).doc(tempNickname).get();
                if (!userDoc.exists) return alert('Аккаунт не найден');
                if (userDoc.data().password !== pass) return alert('Неверный пароль');
                currentUser = userDoc.data(); currentUser.nickname = tempNickname;
                completeLogin();
            }
        }

        async function joinRoom(roomId) {
            playButtonSoundEffect();
            const room = await db.collection(ROOMS).doc(roomId).get();
            if (!room.exists) return alert('Комната не найдена');
            const data = room.data();
            if (data.players.length >= data.maxPlayers) return alert('Комната заполнена');
            await db.collection(ROOMS).doc(roomId).update({ players: firebase.firestore.FieldValue.arrayUnion(currentUser.nickname) });
            currentRoomId = roomId;
            await transitionTo('room', 'room');
            listenRoom(roomId);
        }
        function listenRoom(roomId) {
            if (roomListener) roomListener();
            roomListener = db.collection(ROOMS).doc(roomId).onSnapshot(async doc => {
                if (!doc.exists) { alert('Комната удалена'); await leaveRoom(); return; }
                currentRoomData = doc.data();
                updateRoomUI();
                if (currentRoomData.players.length === 0) await doc.ref.delete();
                // Удаление при бездействии 5 минут (только если комната пуста или 1 игрок)
                if (currentRoomData.players.length === 1 && (Date.now() - currentRoomData.createdAt) > 300000) {
                    await doc.ref.delete();
                    if (currentRoomId === roomId) await leaveRoom();
                }
                // Если все готовы - запускаем таймер 15 секунд
                if (currentRoomData.ready?.length === currentRoomData.players.length && 
                    currentRoomData.players.length >= currentRoomData.minPlayers && 
                    currentRoomData.status === 'waiting' && !window.gameStartTimerActive) {
                    startGameCountdown(roomId);
                }
            });

                    clearInterval(countdownInterval);

        // ========== 3D Карта - Психбольница ==========
        function initThree() {
            const canvas = document.getElementById('game-canvas');
            const width = window.innerWidth;
            const height = window.innerHeight;
            threeScene = new THREE.Scene();
            threeScene.background = new THREE.Color(0x050505);
            threeScene.fog = new THREE.FogExp2(0x050505, 0.008);
            camera = new THREE.PerspectiveCamera(75, width/height, 0.1, 500);
            camera.position.set(0, 2, 5);
            renderer = new THREE.WebGLRenderer({ canvas });
            renderer.setSize(width, height);
            renderer.shadowMap.enabled = true;

            // Освещение - тёмное, с мигающими лампами
            const ambient = new THREE.AmbientLight(0x111111);
            threeScene.add(ambient);
            const backLight = new THREE.DirectionalLight(0x442222, 0.4);
            backLight.position.set(-1, 1, -1);
            threeScene.add(backLight);
            // Мигающие красные лампы
            const flickerLights = [];
            for (let i = 0; i < 15; i++) {
                const light = new THREE.PointLight(0x883333, 0.3, 25);
                light.position.set((Math.random() - 0.5) * 150, 2 + Math.random() * 3, (Math.random() - 0.5) * 150);
                threeScene.add(light);
                flickerLights.push(light);
            }
            setInterval(() => {
                flickerLights.forEach(l => l.intensity = 0.2 + Math.random() * 0.6);
            }, 300);

            // Стены - психбольница
            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x886666, roughness: 0.9, metalness: 0.05 });
            const pillarMaterial = new THREE.MeshStandardMaterial({ color: 0xaa8888, roughness: 0.7 });
            // Пол - плитка
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x553333, roughness: 0.8, metalness: 0.1 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE), floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.position.y = 0;
            floor.receiveShadow = true;
            threeScene.add(floor);

            // Создаем лабиринт стен
            for (let i = -MAP_SIZE/2; i <= MAP_SIZE/2; i += 4) {
                for (let j = -MAP_SIZE/2; j <= MAP_SIZE/2; j += 4) {
                    // Коридоры по краям
                    if (Math.abs(i) > MAP_SIZE/2 - 8 || Math.abs(j) > MAP_SIZE/2 - 8) continue;
                    // Комнаты и стены
                    if (Math.random() < 0.35) {
                        const heightWall = 2.5 + Math.random() * 1.5;
                        const wall = new THREE.Mesh(new THREE.BoxGeometry(3.5, heightWall, 3.5), wallMaterial);
                        wall.position.set(i, heightWall/2, j);
                        wall.castShadow = true;
                        wall.receiveShadow = true;
                        threeScene.add(wall);
                        walls.push(wall);
                    }
                }
            }
            // Добавляем колонны
            for (let i = 0; i < 80; i++) {
                const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 4, 6), pillarMaterial);
                pillar.position.set((Math.random() - 0.5) * 160, 2, (Math.random() - 0.5) * 160);
                pillar.castShadow = true;
                threeScene.add(pillar);
            }
            // Разбросанные кровати, шкафы (простые кубы)
            const furnitureMat = new THREE.MeshStandardMaterial({ color: 0x885555 });
            for (let i = 0; i < 60; i++) {
                const furn = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 0.8), furnitureMat);
                furn.position.set((Math.random() - 0.5) * 150, 0.6, (Math.random() - 0.5) * 150);
                furn.castShadow = true;
                threeScene.add(furn);
            }

            playerSprites = {};
        }

        function startGame() {
            if (gameActive) return;
            const playersList = currentRoomData.players;
            const seekerIndex = Math.floor(Math.random() * playersList.length);
            const seekerName = playersList[seekerIndex];
            isSeeker = (seekerName === currentUser.nickname);
            initThree();
            initNetwork();
            gameActive = true;
            gamePhase = 'hide';
            hideTimer = 30;
            document.getElementById('game-message').textContent = isSeeker ? '🔴 ВЫ ВОДА! Ждите 30 секунд...' : '🟢 ПРЯЧЬТЕСЬ! 30 секунд';
            document.getElementById('game-timer').textContent = `Спрятаться: ${hideTimer}`;
            switchMusic(null, 300, 0);
            let hideInterval = setInterval(() => {
                if (!gameActive || gamePhase !== 'hide') { clearInterval(hideInterval); return; }
                hideTimer--;
                document.getElementById('game-timer').textContent = `Спрятаться: ${hideTimer}`;
                if (hideTimer <= 0) {
                    clearInterval(hideInterval);
                    gamePhase = 'seek';
                    seekTimer = 270;
                    document.getElementById('game-message').textContent = isSeeker ? '🔍 ИЩИТЕ ИГРОКОВ!' : '🏃 УБЕГАЙТЕ!';
                    document.getElementById('game-timer').textContent = `Время поиска: 4:30`;
                    switchMusic(seekMusic, 500, 1000);
                    startSeekTimer();
                }
            }, 1000);
        }

        function startSeekTimer() {
            let seekInterval = setInterval(() => {
                if (!gameActive || gamePhase !== 'seek') { clearInterval(seekInterval); return; }
                seekTimer--;
                let minutes = Math.floor(seekTimer/60);
                let seconds = seekTimer%60;
                document.getElementById('game-timer').textContent = `${minutes}:${seconds<10?'0'+seconds:seconds}`;
                if (seekTimer <= 0) {
                    clearInterval(seekInterval);
                    endGame(false);
                }
            }, 1000);
        }

        function updateChase(playerInSight) {
            if (gamePhase !== 'seek') return;
            if (playerInSight && !chaseActive) {
                chaseActive = true;
                if (chaseTimeout) clearTimeout(chaseTimeout);
                if (currentMusic === seekMusic) {
                    fadeAudio(seekMusic, 0, 300);
                    setTimeout(() => {
                        chaseMusic.currentTime = 0;
                        chaseMusic.play().catch(()=>{});
                        fadeAudio(chaseMusic, 0.8, 300);
                        currentMusic = chaseMusic;
                    }, 300);
                }
            } else if (!playerInSight && chaseActive) {
                if (chaseTimeout) clearTimeout(chaseTimeout);
                chaseTimeout = setTimeout(() => {
                    chaseActive = false;
                    if (currentMusic === chaseMusic) {
                        fadeAudio(chaseMusic, 0, 300);
                        setTimeout(() => {
                            seekMusic.currentTime = 0;
                            seekMusic.play().catch(()=>{});
                            fadeAudio(seekMusic, 0.8, 300);
                            currentMusic = seekMusic;
                        }, 300);
                    }
                }, 5000);
            }
        }

        function endGame(seekerWon) {
            if (!gameActive) return;
            gameActive = false;
            if (gameLoop) clearInterval(gameLoop);
            if (currentMusic) fadeAudio(currentMusic, 0, 500);
            setTimeout(() => {
                let resultMusic = seekerWon ? winMusic : loseMusic;
                resultMusic.play().catch(()=>{});
                fadeAudio(resultMusic, 0.8, 500);
                setTimeout(() => {
                    fadeAudio(resultMusic, 0, 500);
                    setTimeout(() => {
                        resultsMusic.play().catch(()=>{});
                        fadeAudio(resultsMusic, 0.8, 500);
                        document.getElementById('stats').innerHTML = `
                            <div style="font-size:32px; margin-bottom:20px;">${seekerWon ? '🏆 ВОДА ПОБЕДИЛ!' : '✨ ПРЯТКИ ПОБЕДИЛИ!'}</div>
                            <div>💰 Монеты: +${Math.floor(Math.random() * 50) + 30}</div>
                            <div>⏱️ Время игры: ${Math.floor((300 - seekTimer)/60)}:${(300 - seekTimer)%60<10?'0'+(300 - seekTimer)%60:(300 - seekTimer)%60}</div>
                            <div>🏃 Погоня была активна: ${chaseActive ? 'Да' : 'Нет'}</div>
                        `;
                        document.getElementById('results-screen').classList.remove('hidden');
                        setTimeout(() => {
                            if (document.getElementById('results-screen').classList.contains('hidden')) return;
                            closeResults();
                        }, 30000);
                    }, 500);
                }, 4000);
            }, 500);
        }

        function closeResults() {
            if (resultsMusic) fadeAudio(resultsMusic, 0, 500);
            document.getElementById('results-screen').classList.add('hidden');
            transitionTo('menu', 'menu');
        }

        function initNetwork() {
            myPlayerId = currentUser.nickname;
            const roomRef = rtdb.ref(`game_rooms/${currentRoomId}`);
            const myRef = roomRef.child('players').child(myPlayerId);
            myRef.set({
                nickname: currentUser.nickname,
                x: myPos.x, y: myPos.y, z: myPos.z,
                rotY: 0, skin: currentUser.skin||'default', status: myStatus, isSeeker: isSeeker
            });
            roomRef.child('players').on('value', (snap) => {
                players = snap.val() || {};
                for (let id in players) {
                    if (id === myPlayerId) continue;
                    const p = players[id];
                    if (!playerSprites[id]) {
                        const geo = new THREE.BoxGeometry(0.8, 1.8, 0.8);
                        const mat = new THREE.MeshStandardMaterial({ color: p.isSeeker ? 0xaa3333 : 0x66aa66 });
                        const sprite = new THREE.Mesh(geo, mat);
                        sprite.position.set(p.x, p.y, p.z);
                        threeScene.add(sprite);
                        playerSprites[id] = sprite;
                        // Никнейм над головой
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 256;
                        canvas.height = 64;
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'Bold 20px Arial';
                        ctx.shadowColor = 'black';
                        ctx.fillText(p.nickname, 10, 30);
                        const texture = new THREE.CanvasTexture(canvas);
                        const textSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
                        textSprite.scale.set(1.2, 0.4, 1);
                        textSprite.position.set(p.x, p.y+1.2, p.z);
                        threeScene.add(textSprite);
                        playerSprites[id].userData = { textSprite };
                    } else {
                        playerSprites[id].position.set(p.x, p.y, p.z);
                        if (playerSprites[id].userData?.textSprite) playerSprites[id].userData.textSprite.position.set(p.x, p.y+1.2, p.z);
                    }
                }
                for (let id in playerSprites) {
                    if (!players[id]) {
                        threeScene.remove(playerSprites[id]);
                        if (playerSprites[id].userData?.textSprite) threeScene.remove(playerSprites[id].userData.textSprite);
                        delete playerSprites[id];
                    }
                }
                if (isSeeker && gamePhase === 'seek') {
                    let visible = false;
                    for (let id in players) {
                        if (id === myPlayerId) continue;
                        const p = players[id];
                        const dx = p.x - myPos.x;
                        const dz = p.z - myPos.z;
                        const distance = Math.hypot(dx, dz);
                        if (distance < 12) {
                            visible = true;
                            if (distance < 1.8) { endGame(true); return; }
                        }
                    }
                    updateChase(visible);
                }
            });
            gameLoop = setInterval(() => {
                if (!gameActive) return;
                if (joystickActive) {
                    myPos.x += joystickVector.x * 2.2;
                    myPos.z += joystickVector.z * 2.2;
                    myPos.x = Math.max(-MAP_SIZE/2+3, Math.min(MAP_SIZE/2-3, myPos.x));
                    myPos.z = Math.max(-MAP_SIZE/2+3, Math.min(MAP_SIZE/2-3, myPos.z));
                }
                myRef.update({ x: myPos.x, y: myPos.y, z: myPos.z, rotY: myPos.rotY });
            }, 500);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (threeScene && camera && renderer && gameActive) {
                camera.position.x = myPos.x;
                camera.position.z = myPos.z - 6;
                camera.position.y = myPos.y + 2.5;
                camera.lookAt(myPos.x, myPos.y+1, myPos.z);
                renderer.render(threeScene, camera);
            }
        }

        async function leaveGame() {
            playButtonSoundEffect();
            gameActive = false;
            if (gameLoop) clearInterval(gameLoop);
            if (currentRoomId) {
                rtdb.ref(`game_rooms/${currentRoomId}/players/${myPlayerId}`).remove();
                await db.collection(ROOMS).doc(currentRoomId).update({ status: 'waiting' });

            await transitionTo('menu', 'menu');
        }

        // ========== Плавные переходы ==========
        async function transitionTo(screenName, targetMusic) {
            if (isTransitioning) return;
            isTransitioning = true;
            lockButtons();
            const current = document.querySelector('.screen.active');
            const target = document.getElementById(`${screenName}-screen`);
            if (!target) { unlockButtons(); isTransitioning=false; return; }
            if (targetMusic === 'room') {
                overlay.classList.add('dark');
                if (currentMusic === bgMusic) fadeAudio(bgMusic, 0, 800);
                await new Promise(r=>setTimeout(r,800));
                switchMusic(roomMusic);
            } else if (targetMusic === 'submenu') {
                overlay.classList.add('dark');
                if (currentMusic === bgMusic) fadeAudio(bgMusic, 0.4, 400);
                await new Promise(r=>setTimeout(r,400));
            } else {
                overlay.classList.remove('dark');
                if (currentMusic === roomMusic) {
                    fadeAudio(roomMusic, 0, 800);
                    await new Promise(r=>setTimeout(r,800));
                    switchMusic(bgMusic);
                } else if (currentMusic === bgMusic && targetMusic === 'menu') {
                    fadeAudio(bgMusic, 0.8, 400);
                } else if (currentMusic !== bgMusic) {
                    switchMusic(bgMusic, 400, 800);
                }
            }
            if (current) current.classList.remove('active');
            target.classList.add('active');
            setTimeout(() => { unlockButtons(); isTransitioning=false; }, 150);
        }
        function lockButtons() { document.getElementById('app').classList.add('transition-lock'); }
        function unlockButtons() { document.getElementById('app').classList.remove('transition-lock'); }

        // ========== Управление джойстиком ==========
        const joystickDiv = document.getElementById('joystick');
        const thumb = document.getElementById('joystick-thumb');
        let joystickRect = joystickDiv.getBoundingClientRect();
        function updateJoystickRect() { joystickRect = joystickDiv.getBoundingClientRect(); }
        window.addEventListener('resize', updateJoystickRect);
        window.addEventListener('orientationchange', updateJoystickRect);
        updateJoystickRect();

        joystickDiv.addEventListener('touchstart', handleJoystick);
        joystickDiv.addEventListener('touchmove', handleJoystick);
        joystickDiv.addEventListener('touchend', () => {
            joystickActive = false;
            thumb.style.transform = 'translate(-50%, -50%)';
            joystickVector = { x:0, z:0 };
        });
        function handleJoystick(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const centerX = joystickRect.left + joystickRect.width/2;
            const centerY = joystickRect.top + joystickRect.height/2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const distance = Math.hypot(dx, dy);
            const maxDist = joystickRect.width/2;
            if (distance > maxDist) { dx = dx / distance * maxDist; dy = dy / distance * maxDist; }
            thumb.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickActive = true;
            joystickVector = { x: dx / maxDist, z: -dy / maxDist };
            myPos.rotY = Math.atan2(dx, -dy) * 180 / Math.PI;
        }

        // ========== Настройки ==========
        async function showSettings() { playButtonSoundEffect(); await transitionTo('settings','submenu'); }
        async function hideSettings() { playButtonSoundEffect(); await transitionTo('menu','menu'); }
        async function showStream() { playButtonSoundEffect(); await transitionTo('stream','submenu'); }
        async function hideStream() { playButtonSoundEffect(); await transitionTo('menu','menu'); }
        async function changePassword() {
            const old = await prompt('Старый пароль');
            if (!old || old !== currentUser.password) return alert('Неверный пароль');
            const newPass = await prompt('Новый пароль (латиница, ._-)');
            if (!/^[a-zA-Z0-9._-]{1,20}$/.test(newPass)) return alert('Недопустимый пароль');
            const confirm = await prompt('Подтвердите');
            if (newPass !== confirm) return alert('Не совпадают');
            currentUser.password = newPass;
            await db.collection(GAME_USERS).doc(currentUser.nickname).update({ password: newPass });
            alert('Пароль изменён');
        }
        async function changeNickname() {
            const newNick = await prompt('Новый никнейм');
            if (!newNick || newNick.length>20) return alert('Некорректный');
            const existing = await db.collection(GAME_USERS).where('nickname','==',newNick).get();
            if (!existing.empty) return alert('Занят');
            const oldNick = currentUser.nickname;
            await db.collection(GAME_USERS).doc(newNick).set({...currentUser, nickname:newNick});
            await db.collection(GAME_USERS).doc(oldNick).delete();
            currentUser.nickname = newNick;
            localStorage.setItem('hns_user', JSON.stringify(currentUser));
            document.getElementById('menu-nickname').textContent = newNick;
            alert('Никнейм изменён');
        }
        function logout() { confirm('Выйти?').then(r=>{if(r){localStorage.removeItem('hns_user'); location.reload();}}); }
        async function deleteAccount() {
            const pass = await prompt('Пароль');
            if (pass !== currentUser.password) return alert('Неверный');
            if (await confirm('Удалить навсегда?')) {
                await db.collection(GAME_USERS).doc(currentUser.nickname).delete();
                localStorage.removeItem('hns_user');
                location.reload();
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('hns_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                db.collection(GAME_USERS).doc(currentUser.nickname).get().then(doc => {
                    if (doc.exists) { currentUser = doc.data(); currentUser.nickname = doc.id; completeLogin(); }
                    else { localStorage.removeItem('hns_user'); location.reload(); }
                });
            }
        };
    </script>
</body>
